<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChloroWave</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app">
        <header>
    <h1>ChloroWave <span>MP3 Player</span></h1>
    <div id="auth-section">
        <button id="login-btn">Login Google Drive</button>
        
        <div id="user-profile" class="hidden">
            <div class="user-info" onclick="toggleUserMenu()">
                <span id="username-display">Loading...</span>
                <span class="arrow-icon">▼</span>
            </div>
            
            <div id="user-menu" class="hidden">
                <div class="menu-item">
                    <label>Edit Nama:</label>
                    <div class="input-row">
                        <input type="text" id="edit-username-input" placeholder="Nama baru...">
                        <button onclick="saveUsername()">Update</button>
                    </div>
                </div>
                <hr>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>
</header>

        <section id="request-section">
‎            <h3>Request Lagu Baru (Proses 1x24 Jam)</h3>
‎            <div class="input-group">
‎                <input type="text" id="song-request" placeholder="Contoh: Tulus - Hati Hati di Jalan">
‎                <button onclick="sendRequest()">Kirim</button>
‎            </div>
‎        </section>

        <section id="player-section">
            <div id="current-song">Memilih lagu...</div>
            <audio id="audio-player" controls></audio>
            
            <div class="controls">
                <button onclick="prev()">⏮</button>
                <button onclick="next()">⏭</button>
            </div>
        </section>

        <section id="playlist-section">
            <h3>Playlist Saya (Ready in Drive)</h3>
            <ul id="playlist-ui">
                </ul>
        </section>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="app.js"></script>
</body>
</html>
