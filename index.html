<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudMusic PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app">
        <header>
            <h1>CloudMusic <span>Premium</span></h1>
            <button id="login-btn">Login Google Drive</button>
        </header>

        <section id="request-section">
            <h3>Request Lagu Baru (Proses 1x24 Jam)</h3>
            <div class="input-group">
                <input type="text" id="song-request" placeholder="Contoh: Tulus - Hati Hati di Jalan">
                <button onclick="sendRequest()">Kirim</button>
            </div>
        </section>

        <section id="player-section">
            <div id="current-song">Memilih lagu...</div>
            <audio id="audio-player" controls></audio>
            
            <div class="controls">
                <button onclick="prev()">⏮</button>
                <button onclick="next()">⏭</button>
            </div>
        </section>

        <section id="playlist-section">
            <h3>Playlist Saya (Ready in Drive)</h3>
            <ul id="playlist-ui">
                </ul>
        </section>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="app.js"></script>
</body>
</html>
